<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ibis Styles Ambassador Seoul Gangnam</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Noto Sans KR', sans-serif;
  background: #f5f7fb;
}

.container {
  max-width: 480px;
  margin: 0 auto;
}

.hero {
  background: linear-gradient(135deg, #6FCF97, #27AE60);
  color: #fff;
  padding: 30px 20px;
  border-radius: 0 0 30px 30px;
}

.section { padding: 20px; }

.title {
  font-size: 20px;
  font-weight: 900;
  margin-bottom: 15px;
}

.step {
  display: flex;
  gap: 15px;
  background: #fff;
  padding: 18px;
  border-radius: 20px;
  margin-bottom: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.05);
}

.step-num {
  width: 50px;
  height: 50px;
  background: linear-gradient(135deg, #ff3b3b, #ff1f1f);
  color: #fff;
  border-radius: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
}

.review-btn {
  display: block;
  width: 90%;
  margin: 10px auto 20px;
  padding: 16px;
  border-radius: 20px;
  text-align: center;
  color: #fff;
  font-weight: 900;
  background: linear-gradient(135deg, #6FCF97, #27AE60);
  text-decoration: none;
}

.product-box {
  background: #fff;
  margin: 20px;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.05);
}

.product-note {
  font-size: 12px;
  color: #888;
}

/* Golden 보너스 */
#goldenBonus {
  display: none;
  margin-top:15px;
  padding:12px;
  border-radius:12px;
  background:linear-gradient(135deg, #fff6cc, #ffe082);
  font-size:13px;
  font-weight:700;
  color:#5a4300;
}

/* 팝업 */
#goldenPopup {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  z-index:9999;
  align-items:center;
  justify-content:center;
}

.popup-box {
  background:#fff;
  padding:30px;
  border-radius:20px;
  text-align:center;
}
</style>
</head>

<body>
<div class="container">

  <div class="hero">
    <h1>ibis Styles Ambassador Seoul Gangnam</h1>
    <p id="heroDesc"></p>
  </div>

  <div class="section">
    <div class="title">참여 방법</div>

    <div class="step"><div class="step-num">1</div><div>QR 찾기</div></div>
    <div class="step"><div class="step-num">2</div><div id="missionText"></div></div>
    <div class="step"><div class="step-num">3</div><div>프런트에 보여주기</div></div>
    <div class="step"><div class="step-num">4</div><div>상품 수령</div></div>
  </div>

  <a class="review-btn" href="#">Google Review 작성하기</a>

  <div class="product-box">
    <h2>🎁 참여 상품 (택 1)</h2>
    <p>Oxford Lego / ibis 타월 / 키링 등</p>

    <!-- ⭐ Golden 전용 보너스 -->
    <div id="goldenBonus">
      🎲 Golden QR 보너스<br>
      가위바위보 승리 시 럭키드로우 1회 추가 제공
    </div>

    <p class="product-note">※ 상품 변동 가능</p>
  </div>

</div>

<!-- 팝업 -->
<div id="goldenPopup">
  <div class="popup-box">
    <h2>🏆 황금 QR 당첨!</h2>
    <button onclick="closePopup()">확인</button>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const mission = params.get("mission") || "staff";

if (mission === "golden") {
  // 보너스 표시
  document.getElementById("goldenBonus").style.display = "block";

  // 폭죽
  confetti({ particleCount: 200, spread: 120 });

  setTimeout(()=>{
    document.getElementById("goldenPopup").style.display = "flex";
  }, 500);
}

function closePopup(){
  document.getElementById("goldenPopup").style.display = "none";
}
</script>

</body>
</html>
